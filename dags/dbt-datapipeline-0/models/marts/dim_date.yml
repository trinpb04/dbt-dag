version: 2

models:
  - name: dim_date
    description: "Date dimension - 1 dòng cho mỗi ngày liên tục (spine), phù đúng khoảng thời gian có đơn hàng trong stg_tpch_orders. Dùng để nối vào fct_orders và tạo hieararchy Year -> Quarter -> Month cho slicer/trục thời gian trong Power Bi."
    columns:
      - name: date_day
        description: "Ngày (grain thấp nhất), khóa join với fct_orders.order_date."
        tests:
          - not_null
          - unique
      - name: year
        description: "Năm."
      - name: quarter
        description: "Quý dạng số (1-4)."
      - name: quarter_name
        description: "Quý dạng hiển thị (Q1, Q2, Q3, Q4)."
      - name: month_num
        description: "Tháng dạng số (1-12) - dùng làm Sort by Column cho month_name."
      - name: month_name
        description: "Tháng dạng tên viết tắt (Jan, Feb...) - dùng hiển thị trên slicer/trục biểu đồ"